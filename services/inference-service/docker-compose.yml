services:
  inference-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      ROUTER_MODEL_PATHS: /app/config/model_paths.json
      ROUTER_RUNTIME_CONFIG: /app/config/runtime_config.json
      INFERENCE_LOG_DIR: /app/logs
      LOG_DIR: /app/logs
    command: ["/app/.venv/bin/uvicorn", "inference_service.main:app", "--host", "0.0.0.0", "--port", "8004", "--workers", "1"]
    ports:
      - "8004:8004"
    volumes:
      - inference_logs:/app/logs
      - ./config:/app/config:ro
      - ${MODEL_WEIGHTS_HOST_PATH:-/srv/eucal/models}:/app/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "scripts/runtime_probe.py", "http-ready", "--port", "8004"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s

volumes:
  inference_logs:
    name: eucal_inference_logs
