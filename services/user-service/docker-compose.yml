services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      LOG_DIR: /app/logs
      LOG_FILE_PREFIX: user
    command: ["/app/.venv/bin/uvicorn", "user_service.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    ports:
      - "8000:8000"
    volumes:
      - user_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "scripts/runtime_probe.py", "http-ready", "--port", "8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  user-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      LOG_DIR: /app/logs
      LOG_FILE_PREFIX: user-worker
    command: ["/app/.venv/bin/arq", "user_service.worker.WorkerSettings"]
    volumes:
      - user_logs:/app/logs
    depends_on:
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/runtime_probe.py", "worker-ready", "--database-url-env", "USER_DATABASE_URL", "--redis-url-env", "USER_QUEUE_REDIS_URL"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

networks:
  backend:
    external: true
    name: eucal_backend_network

volumes:
  user_logs:
    name: eucal_user_logs
