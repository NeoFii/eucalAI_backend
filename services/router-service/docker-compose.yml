services:
  router-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      ROUTER_RUNTIME_CONFIG: /app/config/runtime_config.json
      ROUTER_LOG_DIR: /app/logs
      LOG_DIR: /app/logs
    command: ["/app/.venv/bin/uvicorn", "router_service.main:app", "--host", "0.0.0.0", "--port", "8003", "--workers", "4"]
    ports:
      - "8003:8003"
    volumes:
      - router_logs:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "scripts/runtime_probe.py", "http-ready", "--port", "8003"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  router_logs:
    name: eucal_router_logs
