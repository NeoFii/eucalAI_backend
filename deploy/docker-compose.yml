# 后端 Docker Compose 配置
# 使用方式: docker-compose up -d
# 注意: 此配置假设 MySQL 已使用 eucal_network 网络部署

services:
  user:
    build:
      context: ..        # 指向上级目录
      dockerfile: deploy/Dockerfile
    container_name: eucal_user
    env_file:
      - .env
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql+aiomysql://root:${DB_PASSWORD}@eucal_mysql:3306/${DB_NAME}"
      DATABASE_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DATABASE_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DATABASE_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DATABASE_ECHO: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-frontend,localhost,127.0.0.1}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      ADMIN_SERVICE_URL: "http://eucal_admin:8001"
      DEBUG: ${DEBUG:-false}
    command: ["/app/.venv/bin/uvicorn", "user.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - eucal_network
    depends_on:
      admin:
        condition: service_healthy

  admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: eucal_admin
    env_file:
      - .env
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql+aiomysql://root:${DB_PASSWORD}@eucal_mysql:3306/${DB_NAME}"
      DATABASE_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DATABASE_ECHO: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      DEBUG: ${DEBUG:-false}
    command: ["/app/.venv/bin/uvicorn", "admin.main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "2"]
    ports:
      - "8001:8001"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.15'
          memory: 64M
    networks:
      - eucal_network

  testing:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: eucal_testing
    env_file:
      - .env
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql+aiomysql://root:${DB_PASSWORD}@eucal_mysql:3306/${DB_NAME}"
      DATABASE_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DATABASE_ECHO: "false"
      DEBUG: ${DEBUG:-false}
    command: ["/app/.venv/bin/uvicorn", "testing.main:app", "--host", "0.0.0.0", "--port", "8002", "--workers", "2"]
    ports:
      - "8002:8002"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.15'
          memory: 64M
    networks:
      - eucal_network

networks:
  eucal_network:
    name: eucal_network
    external: true

volumes:
  backend_logs:
    name: eucal_backend_logs
