# Router node: public API gateway only.

services:
  router-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.router-cpu
    restart: unless-stopped
    environment:
      ROUTER_RUNTIME_CONFIG: "/app/deploy/router/runtime_config.json"
      ROUTER_LOG_DIR: "/app/logs"
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://10.0.0.10:8000}
      ADMIN_SERVICE_URL: ${ADMIN_SERVICE_URL:-http://10.0.0.10:8001}
      INFERENCE_SERVICE_URL: ${INFERENCE_SERVICE_URL:-http://10.0.0.20:8004}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change-me}
      INFERENCE_SERVICE_SECRET: ${INFERENCE_SERVICE_SECRET:-change-me}
      INTERNAL_HTTP_MAX_RETRIES: ${INTERNAL_HTTP_MAX_RETRIES:-1}
      INTERNAL_HTTP_RETRY_BACKOFF_SECONDS: ${INTERNAL_HTTP_RETRY_BACKOFF_SECONDS:-0.2}
      INTERNAL_HTTP_CIRCUIT_BREAKER_THRESHOLD: ${INTERNAL_HTTP_CIRCUIT_BREAKER_THRESHOLD:-3}
      INTERNAL_HTTP_CIRCUIT_BREAKER_COOLDOWN_SECONDS: ${INTERNAL_HTTP_CIRCUIT_BREAKER_COOLDOWN_SECONDS:-30}
      CONFIG_REFRESH_INTERVAL_SECONDS: ${CONFIG_REFRESH_INTERVAL_SECONDS:-60}
      CONFIG_FETCH_TIMEOUT_SECONDS: ${CONFIG_FETCH_TIMEOUT_SECONDS:-5}
      AUTODL_API_KEY: ${AUTODL_API_KEY:-}
      AIPING_API_KEY: ${AIPING_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEBUG: ${DEBUG:-false}
    command: ["/app/.venv/bin/uvicorn", "router_service.main:app", "--host", "0.0.0.0", "--port", "8003", "--workers", "4"]
    ports:
      - "8003:8003"
    volumes:
      - router_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "scripts/runtime_probe.py", "http-ready", "--port", "8003"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  router_logs:
    name: eucal_router_logs

