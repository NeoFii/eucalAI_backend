# Backend node: user-service + admin-service + user-worker.
# Requires infra (MySQL + Redis) to be running first:
#   docker compose -f deploy/docker-compose.infra.yml up -d

services:
  user-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.user-service
    restart: unless-stopped
    environment:
      USER_DATABASE_URL: "mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-change-me}@mysql:3306/eucal_ai_user"
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-20}
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change-me}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-https://app.eucal.ai,https://admin.eucal.ai,https://api.eucal.ai}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-none}
      ADMIN_SERVICE_URL: "http://admin-service:8001"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CACHE_REDIS_URL: ${CACHE_REDIS_URL:-redis://redis:6379/2}
      SNOWFLAKE_WORKER_ID: ${USER_SERVICE_SNOWFLAKE_WORKER_ID:-1}
      SNOWFLAKE_DATACENTER_ID: ${SNOWFLAKE_DATACENTER_ID:-1}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      SMTP_FROM: ${SMTP_FROM:-Eucal AI}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: "/app/logs"
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
      LOG_FILE_PREFIX: "user"
      LOG_FILE_MAX_BYTES: ${LOG_FILE_MAX_BYTES:-52428800}
      LOG_FILE_BACKUP_COUNT: ${LOG_FILE_BACKUP_COUNT:-5}
      DEBUG: ${DEBUG:-false}
    command: ["/app/.venv/bin/uvicorn", "user_service.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    ports:
      - "8000:8000"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "scripts/runtime_probe.py", "http-ready", "--port", "8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  admin-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin-service
    restart: unless-stopped
    environment:
      ADMIN_DATABASE_URL: "mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-change-me}@mysql:3306/eucal_ai_admin"
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-20}
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${ADMIN_JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change-me}
      PROVIDER_SECRET_MASTER_KEY: ${PROVIDER_SECRET_MASTER_KEY:-change-me}
      USER_SERVICE_URL: "http://user-service:8000"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-https://app.eucal.ai,https://admin.eucal.ai,https://api.eucal.ai}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-none}
      SNOWFLAKE_WORKER_ID: ${ADMIN_SERVICE_SNOWFLAKE_WORKER_ID:-2}
      SNOWFLAKE_DATACENTER_ID: ${SNOWFLAKE_DATACENTER_ID:-1}
      BOOTSTRAP_SUPERADMIN_ENABLED: ${BOOTSTRAP_SUPERADMIN_ENABLED:-false}
      BOOTSTRAP_SUPERADMIN_REQUIRE_ON_STARTUP: ${BOOTSTRAP_SUPERADMIN_REQUIRE_ON_STARTUP:-true}
      BOOTSTRAP_SUPERADMIN_EMAIL: ${BOOTSTRAP_SUPERADMIN_EMAIL:-}
      BOOTSTRAP_SUPERADMIN_PASSWORD: ${BOOTSTRAP_SUPERADMIN_PASSWORD:-}
      BOOTSTRAP_SUPERADMIN_NAME: ${BOOTSTRAP_SUPERADMIN_NAME:-}
      BOOTSTRAP_SUPERADMIN_RESET_PASSWORD_IF_EXISTS: ${BOOTSTRAP_SUPERADMIN_RESET_PASSWORD_IF_EXISTS:-false}
      BOOTSTRAP_SUPERADMIN_UPDATE_NAME_IF_EXISTS: ${BOOTSTRAP_SUPERADMIN_UPDATE_NAME_IF_EXISTS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: "/app/logs"
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
      LOG_FILE_PREFIX: "admin"
      LOG_FILE_MAX_BYTES: ${LOG_FILE_MAX_BYTES:-52428800}
      LOG_FILE_BACKUP_COUNT: ${LOG_FILE_BACKUP_COUNT:-5}
      DEBUG: ${DEBUG:-false}
    command: ["/app/.venv/bin/uvicorn", "admin_service.main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "2"]
    ports:
      - "8001:8001"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "scripts/runtime_probe.py", "http-ready", "--port", "8001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend

  user-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.user-worker
    restart: unless-stopped
    environment:
      USER_DATABASE_URL: "mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-change-me}@mysql:3306/eucal_ai_user"
      USER_QUEUE_REDIS_URL: ${USER_QUEUE_REDIS_URL:-redis://redis:6379/1}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change-me}
      ADMIN_SERVICE_URL: "http://admin-service:8001"
      SNOWFLAKE_DATACENTER_ID: ${SNOWFLAKE_DATACENTER_ID:-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: "/app/logs"
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
      LOG_FILE_PREFIX: "user-worker"
      LOG_FILE_MAX_BYTES: ${LOG_FILE_MAX_BYTES:-52428800}
      LOG_FILE_BACKUP_COUNT: ${LOG_FILE_BACKUP_COUNT:-5}
      DEBUG: ${DEBUG:-false}
    command: ["/app/.venv/bin/arq", "user_service.worker.WorkerSettings"]
    volumes:
      - backend_logs:/app/logs
    depends_on:
      user-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/runtime_probe.py", "worker-ready", "--database-url-env", "USER_DATABASE_URL", "--redis-url-env", "USER_QUEUE_REDIS_URL"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

networks:
  backend:
    external: true
    name: eucal_backend_network

volumes:
  backend_logs:
    name: eucal_backend_logs
