# Local development: MySQL + Redis
# Usage: docker compose -f infra/docker-compose.local.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: eucal-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: abc123
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../services/admin-service/init-db.sql:/docker-entrypoint-initdb.d/01-admin.sql:ro
      - ../services/user-service/init-db.sql:/docker-entrypoint-initdb.d/02-user.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pabc123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: eucal-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    name: eucal_dev_mysql
